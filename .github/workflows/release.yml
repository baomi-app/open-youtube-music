name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Import Apple Developer Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: "temporary_keychain_password"
        run: |
          # Create paths
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode certificate and write to file
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH

          # Create and unlock temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Find Developer ID Application signing identity and save to environment
          IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID Application" | head -n 1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "❌ Error: Developer ID Application certificate not found in imported keychain."
            exit 1
          fi
          echo "✅ Found Signing Identity: $IDENTITY"
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV

      - name: Build and Sign Native macOS App
        env:
          SIGNING_IDENTITY: ${{ env.SIGNING_IDENTITY }}
          CI: "true"
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Prepare App for Notarization
        run: |
          # Zip the built bundle using ditto to preserve attributes/permissions
          ditto -c -k --keepParent "build/Open YouTube Music.app" "build/Open_YouTube_Music_To_Notarize.zip"

      - name: Notarize App with Apple
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          echo "🚀 Submitting to Apple Notary Service..."
          xcrun notarytool submit "build/Open_YouTube_Music_To_Notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

      - name: Staple Notarization Ticket
        run: |
          echo "🔒 Stapling notarization ticket to the app bundle..."
          xcrun stapler staple "build/Open YouTube Music.app"

      - name: Package Final Distribution Zip
        run: |
          echo "📦 Packaging final release zip..."
          ditto -c -k --keepParent "build/Open YouTube Music.app" "Open-YouTube-Music-macOS.zip"

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Open-YouTube-Music-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
