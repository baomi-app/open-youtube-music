<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 1. Pure Flat White macOS Squircle Background (inset by 10px, rx=111.5 for perfect continuous curvature) -->
  <rect x="10" y="10" width="492" height="492" rx="111.5" fill="#ffffff" />

  <!-- 2. Vibrant YouTube Red Circle (represents YouTube Music disc / red plate) -->
  <circle cx="256" cy="256" r="160" fill="#ff003c" />

  <!-- 3. Crisp White Play Button Triangle (aligned dynamically to the center-right) -->
  <polygon points="205,166 335,256 205,346" fill="#ffffff" />

</svg>
